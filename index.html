<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentOS Bharat — India's AI Education Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f0e2e;color:#fff;line-height:1.6}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;font-family:inherit}

/* CSS Variables */
:root{--accent:#f59e0b;--primary:#1e1b4b;--text-muted:#a5b4fc;--text-dim:#c7d2fe}

/* Animations */
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(245,158,11,0.3)}50%{box-shadow:0 0 40px rgba(245,158,11,0.6)}}

.animate{opacity:0;animation:fadeInUp 0.8s ease-out forwards}
.delay-1{animation-delay:0.1s}
.delay-2{animation-delay:0.2s}
.delay-3{animation-delay:0.3s}
.delay-4{animation-delay:0.4s}
.delay-5{animation-delay:0.5s}

/* Navbar */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(15,14,46,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.1);transition:all 0.3s}
.navbar.scrolled{background:rgba(15,14,46,0.98);box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.navbar-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:72px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.3rem}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#1e1b4b;font-size:0.85rem;font-weight:900}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-link{display:flex;align-items:center;gap:6px;padding:8px 16px;color:#c7d2fe;font-size:0.9rem;border-radius:8px;transition:all 0.3s}
.nav-link:hover{background:rgba(245,158,11,0.1);color:#fff}
.nav-cta{padding:10px 24px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1e1b4b;font-weight:700;border-radius:999px;transition:all 0.3s}
.nav-cta:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(245,158,11,0.5);animation:glow 2s infinite}
.mobile-menu-btn{display:none;padding:8px;color:#fff;font-size:1.5rem;background:none}
.mobile-menu{display:none;position:fixed;top:72px;left:0;right:0;background:rgba(15,14,46,0.98);padding:24px;z-index:999}
.mobile-menu.active{display:block}
.mobile-menu a{display:block;padding:16px;color:#c7d2fe;font-size:1.1rem;margin-bottom:4px;border-radius:12px}
.mobile-menu a:hover{background:rgba(255,255,255,0.1);color:#fff}

/* Hero */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 24px 80px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0f0e2e 0%,#1e1b4b 40%,#312e81 70%,#1e1b4b 100%)}
.hero-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.3;animation:float 6s ease-in-out infinite}
.hero-orb-1{width:400px;height:400px;background:#f59e0b;top:10%;left:10%}
.hero-orb-2{width:300px;height:300px;background:#8b5cf6;top:60%;right:10%;animation-delay:2s}
.hero-orb-3{width:250px;height:250px;background:#06b6d4;bottom:10%;left:40%;animation-delay:4s}
.hero-content{position:relative;z-index:1;max-width:900px;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);border-radius:999px;color:#f59e0b;font-size:0.85rem;font-weight:600;margin-bottom:32px}
.hero-badge::before{content:'';width:8px;height:8px;background:#f59e0b;border-radius:50%;animation:pulse 2s infinite}
.hero h1{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:800;line-height:1.1;margin-bottom:24px;background:linear-gradient(135deg,#fff,#c7d2fe,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-subtitle{font-size:clamp(1.1rem,2.5vw,1.5rem);color:#c7d2fe;margin-bottom:16px}
.hero-tagline{font-size:clamp(1rem,2vw,1.25rem);color:#a5b4fc;margin-bottom:48px;max-width:600px;margin-left:auto;margin-right:auto}
.hero-cta-group{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:48px}
.hero-btn-primary{padding:16px 40px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1e1b4b;font-size:1.1rem;font-weight:700;border-radius:999px;transition:all 0.3s;box-shadow:0 8px 30px rgba(245,158,11,0.4);display:inline-flex;align-items:center;gap:8px}
.hero-btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(245,158,11,0.6)}
.hero-btn-secondary{padding:16px 40px;background:rgba(255,255,255,0.1);color:#fff;font-size:1.1rem;font-weight:600;border-radius:999px;border:1px solid rgba(255,255,255,0.15);transition:all 0.3s;display:inline-flex;align-items:center;gap:8px}
.hero-btn-secondary:hover{background:rgba(255,255,255,0.2);transform:translateY(-3px)}
.trust-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:32px}
.trust-badge{display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:999px;color:#c7d2fe;font-size:0.85rem;transition:all 0.3s}
.trust-badge:hover{background:rgba(255,255,255,0.12);transform:translateY(-2px)}
.staleness-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:999px;color:#22c55e;font-size:0.8rem;font-weight:500}

/* Sections */
.section{padding:100px 24px;position:relative}
.section-inner{max-width:1280px;margin:0 auto}
.section-header{text-align:center;margin-bottom:64px}
.section-label{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);border-radius:999px;color:#f59e0b;font-size:0.85rem;font-weight:600;margin-bottom:20px;text-transform:uppercase;letter-spacing:1px}
.section-title{font-size:clamp(2rem,4vw,3rem);font-weight:800;margin-bottom:16px;line-height:1.2}
.section-title span{color:#f59e0b}
.section-subtitle{color:#a5b4fc;font-size:1.1rem;max-width:600px;margin:0 auto;line-height:1.7}

/* Download */
.platform-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px}
.platform-card{position:relative;padding:32px 24px;border-radius:24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);transition:all 0.3s;overflow:hidden}
.platform-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f59e0b,transparent);opacity:0;transition:opacity 0.3s}
.platform-card:hover::before{opacity:1}
.platform-card:hover{transform:translateY(-8px);box-shadow:0 20px 60px rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.25)}
.platform-icon{width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.8rem;transition:all 0.3s}
.platform-card:hover .platform-icon{transform:scale(1.1) rotate(5deg)}
.platform-title{font-size:1.3rem;font-weight:700;margin-bottom:8px}
.platform-subtitle{color:#a5b4fc;font-size:0.9rem;margin-bottom:20px}
.platform-meta{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.platform-meta span{padding:4px 12px;background:rgba(255,255,255,0.06);border-radius:999px;font-size:0.75rem;color:#a5b4fc;border:1px solid rgba(255,255,255,0.08)}
.platform-min{color:#a5b4fc;font-size:0.8rem;margin-bottom:20px}
.platform-btn{display:block;width:100%;padding:14px 24px;border-radius:999px;color:#fff;font-weight:600;text-align:center;transition:all 0.3s;font-size:0.95rem}
.platform-btn:hover{transform:scale(1.05);box-shadow:0 8px 25px rgba(0,0,0,0.3)}
.bg-android{background:linear-gradient(135deg,#16a34a,#15803d)}
.bg-ios{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
.bg-windows{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.bg-macos{background:linear-gradient(135deg,#4b5563,#1f2937)}
.bg-linux{background:linear-gradient(135deg,#ea580c,#c2410c)}

/* Prebook */
.prebook-section{padding:0 24px;margin-bottom:100px}
.prebook-card{position:relative;max-width:1000px;margin:0 auto;padding:64px 48px;border-radius:24px;background:linear-gradient(135deg,#f59e0b,#fbbf24);overflow:hidden;box-shadow:0 20px 60px rgba(245,158,11,0.3)}
.prebook-card::before{content:'';position:absolute;top:-50%;right:-20%;width:400px;height:400px;background:rgba(255,255,255,0.1);border-radius:50%}
.prebook-card::after{content:'';position:absolute;bottom:-30%;left:-10%;width:300px;height:300px;background:rgba(255,255,255,0.08);border-radius:50%}
.prebook-content{position:relative;z-index:1}
.prebook-label{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;background:rgba(30,27,75,0.2);border-radius:999px;color:#1e1b4b;font-size:0.85rem;font-weight:700;margin-bottom:24px}
.prebook-title{font-size:clamp(2rem,4vw,3rem);font-weight:800;color:#1e1b4b;margin-bottom:16px}
.prebook-desc{color:#1e3a5f;font-size:1.1rem;margin-bottom:48px;max-width:500px}
.prebook-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:64px;align-items:center}
.prebook-feature{display:flex;align-items:center;gap:16px;padding:16px;background:rgba(30,27,75,0.08);border-radius:12px;margin-bottom:16px;transition:all 0.3s}
.prebook-feature:hover{background:rgba(30,27,75,0.15);transform:translateX(8px)}
.prebook-feature-icon{width:40px;height:40px;background:#1e1b4b;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#f59e0b;font-size:1.2rem;flex-shrink:0}
.prebook-feature-text{color:#1e1b4b;font-weight:600}
.prebook-side{text-align:center}
.prebook-price-tag{display:inline-flex;align-items:baseline;gap:4px;margin-bottom:8px}
.prebook-price-tag .currency{font-size:1.5rem;font-weight:700;color:#1e1b4b}
.prebook-price-tag .amount{font-size:5rem;font-weight:800;color:#1e1b4b;line-height:1}
.prebook-price-period{color:#1e3a5f;font-size:1.1rem;margin-bottom:8px}
.prebook-price-strike{text-decoration:line-through;color:#1e3a5f;opacity:0.6;margin-bottom:16px}
.prebook-price-save{display:inline-block;padding:8px 20px;background:#1e1b4b;color:#f59e0b;font-weight:700;border-radius:999px;margin-bottom:32px}
.prebook-cta{padding:18px 56px;background:#1e1b4b;color:#fff;font-size:1.3rem;font-weight:700;border-radius:999px;transition:all 0.3s;box-shadow:0 10px 30px rgba(30,27,75,0.4);display:inline-flex;align-items:center;gap:12px;border:none}
.prebook-cta:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 15px 40px rgba(30,27,75,0.5);animation:glow 2s infinite}

/* Steps */
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
.step-card{position:relative;padding:48px 32px;border-radius:24px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);text-align:center;transition:all 0.3s;overflow:hidden}
.step-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#f59e0b,transparent);transform:scaleX(0);transform-origin:left;transition:transform 0.4s}
.step-card:hover::before{transform:scaleX(1)}
.step-card:hover{transform:translateY(-8px);box-shadow:0 20px 60px rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.25)}
.step-number{width:64px;height:64px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;color:#1e1b4b;margin:0 auto 24px;box-shadow:0 8px 25px rgba(245,158,11,0.4);transition:all 0.3s}
.step-card:hover .step-number{transform:scale(1.1) rotate(10deg)}
.step-title{font-size:1.4rem;font-weight:700;margin-bottom:16px}
.step-desc{color:#a5b4fc;line-height:1.7}

/* Disclaimer */
.disclaimer-card{max-width:800px;margin:0 auto;padding:40px;border-radius:24px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);text-align:center}
.disclaimer-text{color:#a5b4fc;margin-bottom:24px;line-height:1.8;font-size:1.05rem}
.disclaimer-link{display:inline-flex;align-items:center;gap:8px;color:#f59e0b;font-weight:600;transition:all 0.3s}
.disclaimer-link:hover{gap:12px;color:#fbbf24}

/* Pricing */
.pricing-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;align-items:stretch}
.pricing-card{position:relative;padding:40px 32px;border-radius:24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);display:flex;flex-direction:column;transition:all 0.3s;overflow:hidden}
.pricing-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(245,158,11,0.05),transparent);opacity:0;transition:opacity 0.3s}
.pricing-card:hover::before{opacity:1}
.pricing-card:hover{transform:translateY(-8px);box-shadow:0 20px 60px rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.25)}
.pricing-card.popular{background:linear-gradient(180deg,rgba(245,158,11,0.15),rgba(255,255,255,0.08));border-color:rgba(245,158,11,0.4);transform:scale(1.05);z-index:1}
.pricing-card.popular:hover{transform:scale(1.05) translateY(-8px)}
.pricing-best{position:absolute;top:-14px;left:50%;transform:translateX(-50%);padding:6px 20px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1e1b4b;font-size:0.8rem;font-weight:800;border-radius:999px;box-shadow:0 4px 15px rgba(245,158,11,0.4);white-space:nowrap}
.pricing-name{font-size:1.5rem;font-weight:700;margin-bottom:8px}
.pricing-desc{color:#a5b4fc;font-size:0.9rem;margin-bottom:24px;min-height:40px}
.pricing-price{display:flex;align-items:baseline;gap:4px;margin-bottom:8px}
.pricing-price .symbol{font-size:1.5rem;font-weight:700}
.pricing-price .amount{font-size:3.5rem;font-weight:800;line-height:1}
.pricing-period{color:#a5b4fc;font-size:0.9rem;margin-bottom:32px}
.pricing-features{flex:1;margin-bottom:32px}
.pricing-features li{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;font-size:0.95rem;color:#c7d2fe;line-height:1.5}
.pricing-features li::before{content:'✓';color:#22c55e;font-weight:700;flex-shrink:0}
.pricing-features li.unavailable{color:#a5b4fc;opacity:0.5}
.pricing-features li.unavailable::before{content:'✗';color:#ef4444}
.pricing-cta{display:block;width:100%;padding:14px 24px;border-radius:999px;font-weight:700;text-align:center;transition:all 0.3s;font-size:1rem}
.pricing-cta:hover{transform:scale(1.05);box-shadow:0 8px 25px rgba(0,0,0,0.3)}
.pricing-card.popular .pricing-cta{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1e1b4b;box-shadow:0 4px 15px rgba(245,158,11,0.3)}
.pricing-card.popular .pricing-cta:hover{box-shadow:0 8px 25px rgba(245,158,11,0.5)}
.pricing-card:not(.popular) .pricing-cta{background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,255,255,0.2)}
.pricing-card:not(.popular) .pricing-cta:hover{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.3)}

/* Gov Note */
.gov-section{text-align:center;padding:80px 24px;background:linear-gradient(to bottom,rgba(30,27,75,0.3),#0f0e2e)}
.gov-text{color:#a5b4fc;max-width:700px;margin:0 auto;font-size:1.1rem;line-height:1.8}
.gov-text strong{color:#fff}
.gov-text .highlight{color:#f59e0b;font-weight:700}

/* Footer */
.footer{background:linear-gradient(to top,#0f0e2e,rgba(30,27,75,0.5));border-top:1px solid rgba(255,255,255,0.1);padding:80px 24px 40px}
.footer-inner{max-width:1280px;margin:0 auto}
.footer-grid{display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:48px;margin-bottom:64px}
.footer-brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.footer-brand .logo-icon{width:44px;height:44px}
.footer-brand-text{font-weight:800;font-size:1.3rem}
.footer-desc{color:#a5b4fc;font-size:0.95rem;line-height:1.7;max-width:300px}
.footer-social{display:flex;gap:16px;margin-top:24px}
.footer-social a{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:#a5b4fc;transition:all 0.3s}
.footer-social a:hover{background:#f59e0b;color:#1e1b4b;border-color:#f59e0b;transform:translateY(-3px)}
.footer-social a svg{width:20px;height:20px}
.footer-title{color:#fff;font-weight:700;font-size:1.1rem;margin-bottom:24px}
.footer-links li{margin-bottom:14px}
.footer-links a{color:#a5b4fc;font-size:0.95rem;transition:all 0.3s;display:flex;align-items:center;gap:8px}
.footer-links a:hover{color:#fff;transform:translateX(4px)}
.footer-bottom{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:24px;padding-top:32px;border-top:1px solid rgba(255,255,255,0.1)}
.footer-copyright{color:#a5b4fc;font-size:0.9rem}
.footer-lang{display:flex;align-items:center;gap:12px}
.footer-lang span{color:#a5b4fc;font-size:0.9rem}
.footer-lang select{padding:8px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:0.9rem;cursor:pointer}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:2000;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);opacity:0;transition:opacity 0.3s}
.modal-overlay.active{display:flex;opacity:1}
.modal{position:relative;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border-radius:24px;background:#fff;box-shadow:0 25px 50px rgba(0,0,0,0.5);transform:scale(0.9) translateY(20px);transition:transform 0.3s}
.modal-overlay.active .modal{transform:scale(1) translateY(0)}
.modal-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;color:#9ca3af;display:flex;align-items:center;justify-content:center;font-size:1.5rem;transition:all 0.3s;z-index:10;cursor:pointer;background:none}
.modal-close:hover{color:#4b5563;background:#f3f4f6;transform:rotate(90deg)}
.modal-body{padding:48px 32px 32px}
.modal-title{font-size:1.75rem;font-weight:800;color:#1e1b4b;margin-bottom:8px}
.modal-subtitle{color:#6b7280;font-size:1rem;margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:0.9rem;font-weight:600;color:#374151;margin-bottom:8px}
.form-label .required{color:#ef4444}
.form-input{width:100%;padding:14px 18px;border-radius:12px;border:2px solid #e5e7eb;outline:none;font-size:1rem;transition:all 0.3s;background:#fafafa}
.form-input:focus{border-color:#4f46e5;box-shadow:0 0 0 4px rgba(79,70,229,0.1);background:#fff}
.form-input.error{border-color:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,0.1)}
.form-checkbox{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;cursor:pointer}
.form-checkbox input{margin-top:3px;width:18px;height:18px;accent-color:#4f46e5}
.form-checkbox span{font-size:0.9rem;color:#6b7280;line-height:1.5}
.form-checkbox a{color:#4f46e5;font-weight:600}
.form-submit{width:100%;padding:16px 24px;border-radius:999px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:1.1rem;font-weight:700;border:none;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px}
.form-submit:hover{transform:scale(1.02);box-shadow:0 10px 30px rgba(79,70,229,0.4)}
.alert-error{display:flex;align-items:center;gap:10px;padding:14px;border-radius:12px;background:#fef2f2;color:#b91c1c;font-size:0.9rem;margin-bottom:20px;border:1px solid #fecaca}
